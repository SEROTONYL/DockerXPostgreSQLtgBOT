name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-arch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true

      - name: Download modules
        run: go mod download

      - name: Run CI checks
        run: make ci
