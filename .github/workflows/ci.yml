name: CI

on: [push, pull_request]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: make test

      - name: Race
        run: make test-race

      - name: Setup golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.10.1
          install-mode: binary
          skip-save-cache: true
          skip-pkg-cache: true
          skip-build-cache: true
          args: --version

      - name: Prepare repo-local golangci-lint
        run: |
          mkdir -p ./bin
          cp "$(command -v golangci-lint)" ./bin/golangci-lint
          chmod +x ./bin/golangci-lint

      - name: Lint
        run: make lint
