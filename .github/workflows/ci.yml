name: CI

on: [push, pull_request]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: make test

      - name: Race
        run: make test-race

      # Intentionally run local Makefile target instead of golangci-lint-action.
      # This avoids action input/version drift (e.g. v8 rejects `skip-build-cache`
      # and requires golangci-lint version without `v` prefix).
      - name: Install linter
        run: make lint-install

      - name: Verify linter version
        run: ./bin/golangci-lint version

      - name: Lint
        run: make lint
